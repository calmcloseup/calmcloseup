<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<meta name="theme-color" content="#ffe900">
<title>Poster series — calmcloseup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{
    --bg: #ffe900;
    --fg: #ffc600;
    --dark: #ffb500;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ background:var(--bg); color-scheme:light; }
  body{
    background:var(--bg);
    color:var(--fg);
    font-family:'Pretendard','Jost',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  .eng{ font-family:'Futura PT','Jost',sans-serif; }
  header{
    padding:28px 32px;
  }
  .back-link{
    display:inline-flex;
    align-items:center;
    gap:8px;
    text-decoration:none;
    color:var(--dark);
    font-family:'Futura PT','Jost',sans-serif;
    font-size:13px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    transition:color .25s ease;
  }
  .back-link:hover{ color:var(--fg); }
  main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:20px 24px 80px;
  }
  .detail-stage{
    position:relative;
    width:min(78vw, 900px);
    aspect-ratio:4/3;
    border-radius:20px;
    overflow:hidden;
    border:1px solid rgba(255,181,0,0.35);
    box-shadow:0 20px 60px rgba(140,100,0,0.15);
  }
  .detail-stage img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    display:none; /* shown automatically once a real <img src> is added */
  }
  .detail-stage .placeholder-tex{
    position:absolute;
    inset:0;
  }
  .c1 .placeholder-tex{ background:radial-gradient(circle at 30% 30%, var(--bg) 0%, var(--dark) 60%); }
  .c2 .placeholder-tex{ background:repeating-linear-gradient(45deg, var(--dark) 0 2px, var(--bg) 2px 14px); }
  .c3 .placeholder-tex{ background:linear-gradient(135deg, var(--bg) 0%, var(--dark) 70%); }
  .c4 .placeholder-tex{ background:radial-gradient(circle at 70% 60%, var(--dark) 0%, var(--bg) 65%); }
  .c5 .placeholder-tex{ background:repeating-radial-gradient(circle at 50% 50%, var(--dark) 0 1px, var(--bg) 1px 22px); }
  .c6 .placeholder-tex{ background:linear-gradient(200deg, var(--bg) 0%, var(--dark) 60%); }
  .detail-info{
    width:min(78vw, 900px);
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-top:28px;
    flex-wrap:wrap;
    gap:12px;
  }
  .detail-title{
    font-family:'Futura PT','Jost',sans-serif;
    font-weight:700;
    font-size:clamp(20px, 3vw, 32px);
  }
  .detail-meta{
    font-family:'Futura PT','Jost',sans-serif;
    font-size:13px;
    letter-spacing:0.08em;
    color:var(--dark);
  }
  .detail-note{
    width:min(78vw, 900px);
    margin-top:20px;
    font-size:13px;
    color:var(--dark);
    line-height:1.6;
  }
  footer{
    text-align:center;
    padding:24px;
    font-family:'Futura PT','Jost',sans-serif;
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--dark);
  }
</style>
</head>
<body>

<header>
  <a class="back-link eng" href="feed-poster.html">&#8592; Back to feed</a>
  <a class="back-link eng" href="index.html" style="margin-left:16px;">Portfolio home</a>
</header>

<main>
  <div class="detail-stage c2">
    <div class="placeholder-tex"></div>
    <!-- Replace the line below with: <img src="your-image.jpg" alt="Poster series" style="display:block;"> -->
    <img src="" alt="Poster series">
  </div>
  <div class="detail-info">
    <div class="detail-title eng">Poster series</div>
    <div class="detail-meta eng">02 &middot; Poster &middot; 2026.02</div>
  </div>
  <p class="detail-note">* 이 페이지는 임시 자리 표시자입니다. <code>.detail-stage</code> 안의 <code>&lt;img&gt;</code> 태그에 실제 작업 이미지 경로를 넣고 <code>display:none</code>을 지우면 실제 이미지가 표시됩니다.</p>
</main>

<footer class="eng">&copy; 2026 calmcloseup</footer>

</body>
</html>
