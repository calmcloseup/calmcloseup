<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<meta name="theme-color" content="#ffe900">
<title>Graphic — calmcloseup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{ --bg:#ffe900; --fg:#ffc600; --dark:#ffb500; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ background:var(--bg); color-scheme:light; }
  body{
    background:var(--bg);
    color:var(--fg);
    font-family:'Pretendard','Jost',sans-serif;
    min-height:100vh;
  }
  .eng{ font-family:'Futura PT','Jost',sans-serif; }
  header{
    position:sticky;
    top:0;
    z-index:10;
    background:var(--bg);
    border-bottom:1px solid rgba(255,181,0,0.35);
    padding:16px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .back-link{
    text-decoration:none;
    color:var(--dark);
    font-family:'Futura PT','Jost',sans-serif;
    font-size:13px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    transition:color .25s ease;
  }
  .back-link:hover{ color:var(--fg); }
  .feed-title{
    font-family:'Futura PT','Jost',sans-serif;
    font-weight:700;
    font-size:16px;
    letter-spacing:0.04em;
  }
  main{
    max-width:520px;
    margin:0 auto;
    padding:24px 0 80px;
  }
  .post{
    border-bottom:1px solid rgba(255,181,0,0.3);
    padding-bottom:24px;
    margin-bottom:24px;
  }
  .post-head{
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 16px 12px;
  }
  .post-avatar{
    width:32px;
    height:32px;
    border-radius:50%;
    background:var(--dark);
    flex:0 0 auto;
  }
  .post-user{
    font-family:'Futura PT','Jost',sans-serif;
    font-weight:700;
    font-size:13px;
  }
  .post-date{
    font-size:11px;
    color:var(--dark);
    margin-left:auto;
    font-family:'Futura PT','Jost',sans-serif;
    letter-spacing:0.04em;
  }
  .post-image{
    display:block;
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    overflow:hidden;
    text-decoration:none;
  }
  .post-image .tex{ position:absolute; inset:0; }
  .c1 .tex{ background:radial-gradient(circle at 30% 30%, var(--bg) 0%, var(--dark) 60%); }
  .c2 .tex{ background:repeating-linear-gradient(45deg, var(--dark) 0 2px, var(--bg) 2px 14px); }
  .c3 .tex{ background:linear-gradient(135deg, var(--bg) 0%, var(--dark) 70%); }
  .c4 .tex{ background:radial-gradient(circle at 70% 60%, var(--dark) 0%, var(--bg) 65%); }
  .c5 .tex{ background:repeating-radial-gradient(circle at 50% 50%, var(--dark) 0 1px, var(--bg) 1px 22px); }
  .c6 .tex{ background:linear-gradient(200deg, var(--bg) 0%, var(--dark) 60%); }
  .post-image img{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none;
  }
  .post-caption{
    padding:14px 16px 0;
  }
  .post-caption .cap-title{
    font-family:'Futura PT','Jost',sans-serif;
    font-weight:700;
    font-size:14px;
    margin-bottom:6px;
  }
  .post-caption .cap-desc{
    font-size:13px;
    line-height:1.6;
    color:#8a6a12;
  }
  .post-caption .cap-tag{
    display:inline-block;
    margin-top:10px;
    font-family:'Futura PT','Jost',sans-serif;
    font-size:11px;
    letter-spacing:0.06em;
    color:var(--dark);
    border:1px solid rgba(255,181,0,0.4);
    border-radius:999px;
    padding:4px 12px;
  }
  .view-more{
    display:block;
    text-align:center;
    margin-top:10px;
    font-family:'Futura PT','Jost',sans-serif;
    font-size:12px;
    letter-spacing:0.05em;
    color:var(--dark);
  }
</style>
</head>
<body>

<header>
  <a class="back-link eng" href="index.html">&#8592; Portfolio</a>
  <div class="feed-title eng">Graphic</div>
  <span style="width:70px;"></span>
</header>

<main>
  <article class="post">
    <div class="post-head">
      <div class="post-avatar"></div>
      <div class="post-user eng">calmcloseup</div>
      <div class="post-date eng">2026.01</div>
    </div>
    <a class="post-image c3" href="work-03.html">
      <div class="tex"></div>
      <!-- Replace the line below with: <img src="your-image.jpg" alt="Graphic identity" style="display:block;"> -->
      <img src="" alt="Graphic identity">
    </a>
    <div class="post-caption">
      <div class="cap-title eng">Graphic identity</div>
      <div class="cap-desc">브랜드 그래픽 아이덴티티 작업. 심볼과 패턴을 중심으로 전개했습니다.</div>
      <span class="cap-tag eng">Graphic</span>
      <a class="view-more eng" href="work-03.html">View full project &#8594;</a>
    </div>
  </article>

</main>

</body>
</html>
